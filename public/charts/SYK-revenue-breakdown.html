<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYK — Revenue Breakdown</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --c-ms:  #6d28d9;
      --c-ort: #0f766e;
    }
    html.dark {
      --bg: #0f0f0f;
      --text: #e5e5e5;
      --text-muted: #9ca3af;
      --border: #262626;
      --c-ms:  #8b5cf6;
      --c-ort: #14b8a6;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      padding: 18px 16px 14px;
      transition: background 0.15s, color 0.15s;
    }
    svg { display: block; width: 100%; overflow: visible; }
    .note {
      margin-top: 8px;
      font-size: 9px; color: var(--text-muted); line-height: 1.55;
    }
  </style>
</head>
<body>
  <svg id="chart" viewBox="0 0 680 390" xmlns="http://www.w3.org/2000/svg"></svg>
  <p class="note">
    * Vascular includes Inari Medical (~$0.6B, acquired Jan 2024). &nbsp;
    † Joint Replacement = Knees $2.7B + Hips $1.9B + Mako &amp; Enabling Tech $0.8B. &nbsp;
    ‡ Spine = residual OUS wind-down; U.S. business divested. &nbsp;
    FY2025 total $25.1B per Stryker 10-K.
  </p>

  <script>
    (function () {
      try {
        const s = localStorage.getItem('theme');
        const p = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (s === 'dark' || (!s && p)) document.documentElement.classList.add('dark');
      } catch (e) {}
    })();

    const TOTAL = 25116;

    // Segments — units sorted largest → smallest
    const SEG = [
      {
        label: 'MedSurg & Neurotechnology',
        rev: 15647,
        colorKey: '--c-ms',
        // opacity steps: lightest block gets lowest opacity
        opacities: [1.0, 0.80, 0.63, 0.48, 0.36],
        units: [
          { name: 'Medical',       rev: 4204, sub: 'Acute Care · Emergency Care · Sage · Smart Care' },
          { name: 'Endoscopy',     rev: 3807, sub: 'Communications · Endoscopy · Sports Med · Sustainability' },
          { name: 'Instruments',   rev: 3183, sub: 'Orthopaedic Instruments · Surgical Technologies' },
          { name: 'Neuro Cranial', rev: 2485, sub: 'CMF · ENT · IVS · Neurosurgical' },
          { name: 'Vascular *',    rev: 1968, sub: 'Inari Medical · Neurovascular' },
        ],
      },
      {
        label: 'Orthopaedics',
        rev: 9469,
        colorKey: '--c-ort',
        opacities: [1.0, 0.70, 0.22],
        units: [
          { name: 'Joint Replacement †', rev: 5336, sub: 'Knees $2.7B · Hips $1.9B · Mako & ET $0.8B' },
          { name: 'Trauma & Extremities', rev: 3948, sub: 'Trauma · Foot & Ankle · Upper Extremities' },
          { name: 'Spine ‡',              rev: 185,  sub: 'OUS wind-down only', muted: true },
        ],
      },
    ];

    // ── Helpers ──────────────────────────────────────────────────────────────
    const svgNS = 'http://www.w3.org/2000/svg';
    function el(tag, attrs, text) {
      const e = document.createElementNS(svgNS, tag);
      for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
      if (text !== undefined) e.textContent = text;
      return e;
    }
    function v(name) {
      return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }
    function hexAlpha(hex, a) {
      const h = hex.replace('#','');
      const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
      return `rgba(${r},${g},${b},${a})`;
    }
    function fmt(m) { return '$' + (m/1000).toFixed(1) + 'B'; }
    function pct(m, of) { return Math.round(m/of*100) + '%'; }

    // ── Layout constants ──────────────────────────────────────────────────────
    const VW = 680, VH = 390;
    const PX = 12, PT = 10;           // padding x / top
    const availW = VW - 2*PX;        // 656
    const HEADER_H = 36;              // segment header strip
    const GAP_SEG = 8;                // gap between segment columns
    const GAP_UNIT = 3;               // gap between unit rows
    const MAP_H = VH - PT - HEADER_H - 8;  // treemap cell area height

    // Column widths proportional to revenue
    const msW  = Math.round((availW - GAP_SEG) * SEG[0].rev / TOTAL);
    const ortW = availW - GAP_SEG - msW;
    const msX  = PX;
    const ortX = PX + msW + GAP_SEG;

    function colWidth(si) { return si === 0 ? msW : ortW; }
    function colX(si)     { return si === 0 ? msX : ortX; }

    // ── Draw ──────────────────────────────────────────────────────────────────
    function draw() {
      const svg = document.getElementById('chart');
      svg.innerHTML = '';
      const bg    = v('--bg');
      const text  = v('--text');
      const muted = v('--text-muted');
      const font  = '-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif';

      // Total label
      svg.appendChild(el('text', {
        x: PX, y: PT + 13,
        fill: text, 'font-size': 13, 'font-weight': 700, 'font-family': font,
        'letter-spacing': '-0.01em'
      }, 'Stryker FY2025  ·  $25.1B Revenue across 8 Business Units'));

      SEG.forEach((seg, si) => {
        const cx  = colX(si);
        const cw  = colWidth(si);
        const col = v(seg.colorKey);

        // ── Segment header ─────────────────────────────────────────────────
        const hY = PT + 20;
        svg.appendChild(el('rect', {
          x: cx, y: hY, width: cw, height: HEADER_H,
          fill: col, rx: 5
        }));
        // name
        svg.appendChild(el('text', {
          x: cx + 10, y: hY + 14,
          fill: '#fff', 'font-size': 11, 'font-weight': 700, 'font-family': font
        }, seg.label));
        // rev + pct
        svg.appendChild(el('text', {
          x: cx + 10, y: hY + 27,
          fill: 'rgba(255,255,255,0.82)', 'font-size': 10.5, 'font-weight': 500, 'font-family': font
        }, fmt(seg.rev) + '  ·  ' + pct(seg.rev, TOTAL) + ' of total'));

        // ── Unit cells ────────────────────────────────────────────────────
        const cellsY = hY + HEADER_H + 5;
        const nUnits = seg.units.length;
        const totalGapH = (nUnits - 1) * GAP_UNIT;
        const availH = MAP_H - HEADER_H - 5;

        let curY = cellsY;
        seg.units.forEach((unit, ui) => {
          const cellH = Math.round((availH - totalGapH) * unit.rev / seg.rev);
          const op = seg.opacities[ui];
          const isMuted = !!unit.muted;
          const fillColor = isMuted ? hexAlpha(col, 0.18) : hexAlpha(col, op);
          const textOnDark = op >= 0.55 && !isMuted;

          // Cell background
          svg.appendChild(el('rect', {
            x: cx, y: curY, width: cw, height: Math.max(cellH, 4),
            fill: fillColor, rx: 4
          }));

          if (cellH >= 28 && !isMuted) {
            const lineY1 = curY + 14;
            const lineY2 = lineY1 + 13;
            const hasRoom = cellH >= 50;
            const hasSubLine = cellH >= 46;

            // BU name
            svg.appendChild(el('text', {
              x: cx + 9, y: lineY1,
              fill: textOnDark ? '#fff' : text,
              'font-size': 11, 'font-weight': 700, 'font-family': font
            }, unit.name));

            // Revenue + % of total
            svg.appendChild(el('text', {
              x: cx + 9, y: lineY2,
              fill: textOnDark ? 'rgba(255,255,255,0.80)' : muted,
              'font-size': 10, 'font-weight': 500, 'font-family': font
            }, fmt(unit.rev) + '  (' + pct(unit.rev, TOTAL) + ' of total)'));

            // Sub-items line (only if enough room)
            if (hasSubLine && unit.sub) {
              svg.appendChild(el('text', {
                x: cx + 9, y: lineY2 + 12,
                fill: textOnDark ? 'rgba(255,255,255,0.55)' : muted,
                'font-size': 8.5, 'font-family': font
              }, unit.sub));
            }
          } else if (cellH >= 14 && !isMuted) {
            // Compact: name + rev on one line
            svg.appendChild(el('text', {
              x: cx + 9, y: curY + cellH/2 + 4,
              fill: textOnDark ? '#fff' : text,
              'font-size': 10, 'font-weight': 600, 'font-family': font
            }, unit.name + '  ' + fmt(unit.rev)));
          }

          curY += Math.max(cellH, 4) + GAP_UNIT;
        });
      });
    }

    draw();
    new MutationObserver(() => draw()).observe(document.documentElement, {
      attributes: true, attributeFilter: ['class']
    });
  </script>
</body>
</html>
