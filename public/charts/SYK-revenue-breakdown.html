<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYK — Revenue Breakdown</title>
  <style>
    :root { --bg:#ffffff; --text:#111111; --text-muted:#6b7280; --border:#e5e7eb; }
    html.dark { --bg:#0f0f0f; --text:#e5e5e5; --text-muted:#9ca3af; --border:#262626; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;padding:16px 16px 12px;transition:background .15s,color .15s}
    svg{display:block;width:100%;overflow:visible}
    .note{margin-top:8px;font-size:9px;color:var(--text-muted);line-height:1.55}
  </style>
</head>
<body>
  <svg id="chart" viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg"></svg>
  <p class="note">
    * Vascular includes Inari Medical (~$0.6B, acq. Jan 2024). &nbsp;
    † Joint Replacement = Knees $2.7B + Hips $1.9B + Mako &amp; ET $0.8B. &nbsp;
    ‡ Spine = residual OUS wind-down; U.S. divested. &nbsp;
    FY2025 per Stryker 10-K.
  </p>
  <script>
    (function(){try{const s=localStorage.getItem('theme'),p=window.matchMedia('(prefers-color-scheme: dark)').matches;if(s==='dark'||(!s&&p))document.documentElement.classList.add('dark')}catch(e){}})();

    const TOTAL = 25116;

    // Three-level color ramp per segment (header → block → sub-sub squares)
    // Light mode:  c0=header(darkest)  c1=block(mid)  c2=sub-squares(lightest)
    // Dark mode:   same idea, slightly lighter overall
    const SEG = [
      {
        label: 'MedSurg & Neurotechnology', rev: 15647,
        c: { light: ['#3b0764','#6d28d9','#c4b5fd'], dark: ['#5b21b6','#8b5cf6','#ddd6fe'] },
        units: [
          { name: 'Medical',            rev: 4204, subs: ['Acute Care','Emerg. Care','Sage','Smart Care'] },
          { name: 'Endoscopy',          rev: 3807, subs: ['Comm.','Endoscopy','Sports Med.','Sustain.'] },
          { name: 'Instruments',        rev: 3183, subs: ['Orth. Instr.','Surg. Tech.'] },
          { name: 'Neuro Cranial',      rev: 2485, subs: ['CMF','ENT','IVS','Neurosurg.'] },
          { name: 'Vascular *',         rev: 1968, subs: ['Inari Med.','Neurovasc.'] },
        ],
      },
      {
        label: 'Orthopaedics', rev: 9469,
        c: { light: ['#042f2e','#0f766e','#99f6e4'], dark: ['#0f766e','#14b8a6','#ccfbf1'] },
        units: [
          { name: 'Joint Replacement †', rev: 5336, subs: ['Knees','Hips','Mako & ET'] },
          { name: 'Trauma & Extremities',rev: 3948, subs: ['Trauma','Foot & Ankle','Upper Ext.'] },
          { name: 'Spine ‡',             rev: 185,  muted: true, subs: [] },
        ],
      },
    ];

    const svgNS = 'http://www.w3.org/2000/svg';
    function el(tag, attrs, text) {
      const e = document.createElementNS(svgNS, tag);
      for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
      if (text !== undefined) e.textContent = text;
      return e;
    }
    function css(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
    function fmt(m) { return '$'+(m/1000).toFixed(1)+'B'; }
    function pct(m,of) { return Math.round(m/of*100)+'%'; }
    function tw(str, fs) { return str.length * fs * 0.56; }

    function draw() {
      const svg = document.getElementById('chart');
      svg.innerHTML = '';
      const isDark = document.documentElement.classList.contains('dark');
      const TEXT  = css('--text');
      const MUTED = css('--text-muted');
      const font  = '-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif';

      const VW=680, VH=470, PX=14, PT=12;
      const availW  = VW - 2*PX;
      const GAP_SEG = 8;
      const STRIP_Y = PT + 22;
      const STRIP_H = 30;
      const BLOCKS_Y = STRIP_Y + STRIP_H + 5;
      const BLOCKS_H = VH - BLOCKS_Y - 10;
      const GAP_UNIT = 4;

      const msW  = Math.round((availW - GAP_SEG) * SEG[0].rev / TOTAL);
      const ortW = availW - GAP_SEG - msW;
      const cols = [
        { x: PX,                  w: msW,  seg: SEG[0] },
        { x: PX + msW + GAP_SEG,  w: ortW, seg: SEG[1] },
      ];

      // Title
      svg.appendChild(el('text', {
        x: PX, y: PT+12,
        fill: TEXT, 'font-size': 12, 'font-weight': 700, 'font-family': font,
        'letter-spacing': '-0.01em'
      }, 'Stryker FY2025  ·  $25.1B Revenue  ·  8 Business Units'));

      cols.forEach(({ x: cx, w: cw, seg }) => {
        const colors = isDark ? seg.c.dark : seg.c.light;
        const c0 = colors[0]; // header (darkest)
        const c1 = colors[1]; // sub-segment blocks (one lighter)
        const c2 = colors[2]; // sub-sub squares (lightest)

        // ── Segment header strip ────────────────────────────────────────────
        svg.appendChild(el('rect', {
          x: cx, y: STRIP_Y, width: cw, height: STRIP_H, fill: c0, rx: 5
        }));
        svg.appendChild(el('text', {
          x: cx+10, y: STRIP_Y+13,
          fill: '#fff', 'font-size': 10.5, 'font-weight': 700, 'font-family': font
        }, seg.label));
        svg.appendChild(el('text', {
          x: cx+10, y: STRIP_Y+25,
          fill: 'rgba(255,255,255,0.75)', 'font-size': 9.5, 'font-family': font
        }, fmt(seg.rev) + '  ·  ' + pct(seg.rev, TOTAL) + ' of total revenue'));

        // ── Sub-segment blocks ──────────────────────────────────────────────
        const nU     = seg.units.length;
        const availH = BLOCKS_H - (nU-1) * GAP_UNIT;
        let curY     = BLOCKS_Y;

        seg.units.forEach((unit, ui) => {
          const blockH = ui < nU-1
            ? Math.round(availH * unit.rev / seg.rev)
            : (BLOCKS_Y + availH + (nU-1)*GAP_UNIT) - curY;
          const realH  = Math.max(blockH, 5);
          const isMuted = !!unit.muted;

          // Block — c1 (one lighter than header)
          svg.appendChild(el('rect', {
            x: cx, y: curY, width: cw, height: realH,
            fill: c1, rx: 4,
            opacity: isMuted ? 0.18 : 1
          }));

          if (!isMuted && realH >= 30) {
            // BU name
            svg.appendChild(el('text', {
              x: cx+9, y: curY+14,
              fill: '#fff', 'font-size': 11, 'font-weight': 700, 'font-family': font
            }, unit.name));

            // Revenue + % of total
            if (realH >= 40) {
              svg.appendChild(el('text', {
                x: cx+9, y: curY+25,
                fill: 'rgba(255,255,255,0.68)', 'font-size': 8.5, 'font-family': font
              }, fmt(unit.rev) + '  (' + pct(unit.rev, TOTAL) + ' of total)'));
            }

            // Large % watermark — all blocks with realH >= 40
            if (realH >= 40) {
              // Scale font to block height so it never overflows
              const wFontSize = Math.min(52, Math.round(realH * 0.65));
              svg.appendChild(el('text', {
                x: cx + cw - 14, y: curY + realH/2 + wFontSize*0.38,
                'text-anchor': 'end',
                fill: 'rgba(255,255,255,0.28)',
                'font-size': wFontSize, 'font-weight': 800, 'font-family': font
              }, pct(unit.rev, TOTAL)));
            }

            // Sub-sub squares — c2 (one lighter than block)
            if (realH >= 50 && unit.subs.length > 0) {
              const SQ         = 14;    // bigger squares
              const SQ_R       = 3;
              const SQ_TXT_GAP = 4;
              const CHIP_GAP   = 8;
              const LABEL_FS   = 9.5;  // bigger font
              const PAD_BOT    = 7;
              const PAD_LEFT   = 9;

              const sqTop  = curY + realH - PAD_BOT - SQ;
              const textY  = sqTop + SQ - 1;

              let chipX = cx + PAD_LEFT;
              unit.subs.forEach((sub) => {
                svg.appendChild(el('rect', {
                  x: chipX, y: sqTop, width: SQ, height: SQ,
                  fill: c2, rx: SQ_R
                }));
                svg.appendChild(el('text', {
                  x: chipX + SQ + SQ_TXT_GAP, y: textY,
                  fill: 'rgba(255,255,255,0.85)',
                  'font-size': LABEL_FS, 'font-family': font
                }, sub));
                chipX += SQ + SQ_TXT_GAP + tw(sub, LABEL_FS) + CHIP_GAP;
              });
            }
          }

          curY += realH + GAP_UNIT;
        });
      });
    }

    draw();
    new MutationObserver(() => draw()).observe(document.documentElement, {
      attributes: true, attributeFilter: ['class']
    });
  </script>
</body>
</html>
