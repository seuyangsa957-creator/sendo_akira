<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hours Studied by Subject</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #6b7280;
      --border: #e5e7eb;
      --track: #f3f4f6;
      --tooltip-bg: #111111;
      --tooltip-text: #ffffff;
    }

    body.dark {
      --bg: #0f0f0f;
      --text: #e5e5e5;
      --muted: #9ca3af;
      --border: #262626;
      --track: #1c1c1c;
      --tooltip-bg: #e5e5e5;
      --tooltip-text: #111111;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.75rem 1.5rem;
      transition: background 0.15s, color 0.15s;
    }

    .chart-title {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 1.75rem;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .chart {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .row {
      display: grid;
      grid-template-columns: 110px 1fr 36px;
      align-items: center;
      gap: 0.75rem;
    }

    .label {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }

    .track {
      background: var(--track);
      border-radius: 4px;
      height: 26px;
      overflow: hidden;
      cursor: default;
    }

    .fill {
      height: 100%;
      border-radius: 4px;
      width: 0%;
      transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.15s;
      opacity: 0.8;
    }

    .fill:hover { opacity: 1; }

    .value {
      font-size: 0.78rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 1.5rem;
    }

    .tooltip {
      position: fixed;
      background: var(--tooltip-bg);
      color: var(--tooltip-text);
      padding: 0.35rem 0.65rem;
      border-radius: 5px;
      font-size: 0.75rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 100;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <p class="chart-title">Hours Studied by Subject — March 2026</p>
  <div class="chart" id="chart"></div>
  <p class="subtitle">Hover bars for details</p>
  <div class="tooltip" id="tooltip"></div>

  <script>
    // Match parent site theme
    const stored = localStorage.getItem('theme');
    if (stored === 'dark') document.body.classList.add('dark');

    const data = [
      { label: 'Programming',  hours: 22, color: '#2563eb' },
      { label: 'Mathematics',  hours: 18, color: '#7c3aed' },
      { label: 'Statistics',   hours: 12, color: '#059669' },
      { label: 'Economics',    hours: 8,  color: '#d97706' },
      { label: 'Writing',      hours: 6,  color: '#dc2626' },
    ];

    const max = Math.max(...data.map(d => d.hours));
    const chart = document.getElementById('chart');
    const tooltip = document.getElementById('tooltip');

    data.forEach(d => {
      const pct = ((d.hours / max) * 100).toFixed(2);

      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <span class="label">${d.label}</span>
        <div class="track" data-label="${d.label}" data-hours="${d.hours}">
          <div class="fill" style="background:${d.color}" data-pct="${pct}"></div>
        </div>
        <span class="value">${d.hours}h</span>
      `;
      chart.appendChild(row);
    });

    // Animate bars in after paint
    requestAnimationFrame(() => requestAnimationFrame(() => {
      document.querySelectorAll('.fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    }));

    // Tooltip on tracks
    document.querySelectorAll('.track').forEach(track => {
      track.addEventListener('mousemove', e => {
        tooltip.textContent = `${track.dataset.label}: ${track.dataset.hours} hours`;
        tooltip.style.opacity = '1';
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top = (e.clientY - 34) + 'px';
      });
      track.addEventListener('mouseleave', () => {
        tooltip.style.opacity = '0';
      });
    });
  </script>
</body>
</html>
